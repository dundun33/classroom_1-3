<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1-3 Classroomまとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F7FB; --card:#FFFFFF; --ink:#1B2A4A; --ink-soft:#5C6886;
    --line:#E5E9F2; --head:#6E89BE; --head-soft:#EEF2FA;
    --now:#E5484D; --soon:#E0820B; --week:#86A4D2; --calm:#7A86A3;
    --done:#9AA3B8; --chip:#EFF3FA; --accent:#7E97C8;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"Noto Sans JP",-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.55;padding:20px 16px 64px;-webkit-text-size-adjust:100%}
  .wrap{max-width:920px;margin:0 auto}

  header{margin-bottom:18px}
  .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--ink-soft);font-weight:700}
  .eyebrow a{margin-left:8px;color:var(--accent);text-decoration:none;letter-spacing:0}
  .eyebrow a:hover{text-decoration:underline}
  h1{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:clamp(23px,5.5vw,31px);margin:4px 0 2px}
  .topbar{display:flex;align-items:center;gap:8px 16px;flex-wrap:wrap;margin-top:10px}
  .today{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .today .big{font-family:"Zen Maru Gothic",sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
  .updated{font-size:12px;color:var(--ink-soft)}

  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent);width:15px;height:15px;margin:0}
  .toggle.on{color:var(--accent);border-color:var(--accent);background:#F2F6FD}

  section{margin-top:26px}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .sec-num{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:14px;color:#fff;background:var(--accent);
    width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none}
  .sec-head h2{font-family:"Zen Maru Gothic",sans-serif;font-size:18px;margin:0;font-weight:700}
  .sec-head .count{font-size:12px;color:var(--ink-soft)}

  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card)}
  table{border-collapse:collapse;width:100%;min-width:660px}
  thead th{background:var(--head);color:#fff;font-size:12.5px;font-weight:700;text-align:left;
    padding:10px 12px;white-space:nowrap;font-family:"Zen Maru Gothic",sans-serif}
  thead th.c-chk{width:38px;text-align:center}
  tbody td{padding:11px 12px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:top}
  tbody tr{border-left:5px solid var(--calm)}
  tbody tr.now{border-left-color:var(--now)}
  tbody tr.soon{border-left-color:var(--soon)}
  tbody tr.week{border-left-color:var(--week)}
  tbody tr.flat{border-left-color:var(--calm)}
  tbody tr.past{opacity:.5}
  tbody tr.done{opacity:.45}
  tbody tr.done .todo b{text-decoration:line-through}
  tbody td{transition:background .45s}
  tbody tr.flash td{background:#FFF3CF}

  .c-chk{text-align:center}
  .c-chk input{width:19px;height:19px;accent-color:var(--accent);cursor:pointer}
  .c-date{white-space:nowrap;font-weight:700}
  .c-date .c-subline{display:block;margin-top:7px;font-weight:400}
  .countdown{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .cd-now{background:#FDECEC;color:var(--now)} .cd-soon{background:#FCF1E2;color:var(--soon)}
  .cd-week{background:#EAF1FB;color:var(--week)} .cd-flat{background:var(--chip);color:var(--calm)}
  .cd-past{background:#EFF1F5;color:var(--done)}
  .c-subline .tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:var(--chip);color:var(--accent);white-space:nowrap}
  .todo b{font-weight:700;font-size:14px}
  .todo .opt{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:6px;background:#F0EEFA;color:#6E55C8;margin-left:6px}
  .todo ul{margin:5px 0 0;padding:0;list-style:none}
  .todo li{font-size:13px;color:var(--ink-soft);padding-left:13px;position:relative}
  .todo li::before{content:"・";position:absolute;left:0;color:var(--calm)}
  .c-thread{white-space:nowrap;color:var(--ink-soft)}
  .c-thread .c-postline{display:block;margin-top:7px;color:var(--calm);font-size:12px;font-weight:400;white-space:nowrap}
  .c-thread .c-newline{display:block;margin-top:4px}
  .c-thread .c-newline .newbadge{margin-left:0}
  .c-thread a{color:var(--accent);text-decoration:none}
  .c-thread a:hover{text-decoration:underline}
  .c-post{white-space:nowrap;color:var(--calm);font-size:12.5px}
  .dlink{display:inline-block;margin-left:8px;font-size:11px;font-weight:800;color:var(--now);background:#FDECEC;text-decoration:none;border:1px solid var(--now);border-radius:999px;padding:1px 9px;vertical-align:middle;white-space:nowrap}
  .dlink:hover{background:var(--now);color:#fff}
  .c-post .warn{display:block;color:var(--soon);font-size:11px;margin-top:3px}
  .newbadge{display:inline-block;margin-left:6px;font-size:11px;font-weight:800;
    padding:2px 10px;border-radius:999px;background:#1FA463;color:#fff;letter-spacing:.04em;box-shadow:0 1px 2px rgba(31,164,99,.35)}

  footer{margin-top:34px;font-size:11.5px;color:var(--calm);line-height:1.7;border-top:1px solid var(--line);padding-top:14px}

  .tt-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card)}
  .cbtn{flex:none;width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:17px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0}
  .cbtn:hover{border-color:var(--accent);color:var(--accent)}
  .tt-mk{display:inline-block;margin-top:3px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;background:#FCEFD6;color:#C9760A;white-space:nowrap}
  .tt-link{color:inherit;text-decoration:none;cursor:pointer;display:block}
  .tt-link b{border-bottom:1.5px dotted var(--soon);padding-bottom:1px}
  .tt-link:hover b{border-bottom-style:solid}
  table.tt{border-collapse:collapse;width:100%;min-width:600px}
  table.tt thead th{background:var(--head);color:#fff;font-size:11.5px;font-weight:700;padding:7px 6px;text-align:center;font-family:"Zen Maru Gothic",sans-serif;white-space:nowrap;line-height:1.3}
  table.tt td{border-top:1px solid var(--line);border-left:1px solid #EDF0F6;padding:7px 6px;text-align:center;vertical-align:top}
  table.tt td:first-child{border-left:none}
  .tt-p{font-weight:700;color:var(--ink-soft);background:var(--head-soft);white-space:nowrap}
  .tt-c b{font-size:14px;font-family:"Zen Maru Gothic",sans-serif}
  .tt-c .tt-meta{display:block;font-size:10.5px;color:var(--calm);margin-top:2px;white-space:nowrap}
  td.tt-today{background:#FFF7E6}
  table.tt thead th.tt-today{background:#E0820B}
  .tt-span{vertical-align:middle;background:#FAFBFE}
  .tt-span b{font-size:15px}
  @media (max-width:480px){ body{padding:16px 12px 56px} }
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">1-3 Classroomまとめ <a href="https://classroom.google.com/h" target="_blank" rel="noopener">Classroomを開く ↗</a></div>
    <div class="topbar">
      <div class="today">
        <span class="big" id="todayLabel"></span>
        <span class="updated" id="updateLabel"></span>
      </div>
      <div class="controls">
        <label class="toggle"><input type="checkbox" id="hideDone"> 完了を隠す</label>
        <label class="toggle"><input type="checkbox" id="hidePast"> 過去を隠す</label>
        <label class="toggle"><input type="checkbox" id="hideOpt"> 希望者を隠す</label>
        <label class="toggle"><input type="checkbox" id="hideClub"> 部活を隠す</label>
      </div>
    </div>
  </header>

  <section id="sec-tt" style="display:none">
    <div class="sec-head"><button type="button" class="cbtn" data-target="tt-box">−</button><h2 id="tt-title">時間割</h2><span class="count" id="tt-week"></span></div>
    <div class="tt-wrap" id="tt-box"><table class="tt"><thead id="tt-head"></thead><tbody id="tt-body"></tbody></table></div>
  </section>

  <section>
    <div class="sec-head"><button type="button" class="cbtn" data-target="box-hw">−</button><span class="sec-num">1</span><h2>宿題・提出物</h2><span class="count" id="cnt-hw"></span></div>
    <div class="tbl-wrap" id="box-hw"><table>
      <thead><tr><th class="c-chk">☑️</th><th>日付</th><th>To Do</th><th>スレッド</th></tr></thead>
      <tbody id="list-hw"></tbody>
    </table></div>
  </section>

  <section>
    <div class="sec-head"><button type="button" class="cbtn" data-target="box-no">−</button><span class="sec-num">2</span><h2>連絡事項・予定・ルール</h2><span class="count" id="cnt-no"></span></div>
    <div class="tbl-wrap" id="box-no"><table>
      <thead><tr><th class="c-chk">☑️</th><th>日付</th><th>連絡事項</th><th>スレッド</th></tr></thead>
      <tbody id="list-no"></tbody>
    </table></div>
  </section>

  <footer id="foot"></footer>
</div>

<!-- 中身のデータ。更新するのはこの data.js だけ。index.html はさわらない。 -->
<script src="data.js"></script>
<script>
const DATA = window.CLASSROOM_DATA || {updateISO:'2026-01-01',updateTime:'',items:[]};
const ITEMS = DATA.items;

// スレッド名 → Classroom URL（リンク表示用）
const THREAD_LINKS = {
  '82回生':'https://classroom.google.com/c/ODU4NTUxNTUzOTEy',
  '数学':'https://classroom.google.com/c/ODQ5MzY4MjU2Mzg0',
  '総務':'https://classroom.google.com/c/ODYxMzQ0NDY1OTgx',
  '英語':'https://classroom.google.com/c/ODU5Mzk5NTI1NzA5',
  '理科1分野':'https://classroom.google.com/c/ODY1MzczNzE0NDA5',
  '国語':'https://classroom.google.com/c/ODY0MDgzNTIwNTQ5',
  '地理':'https://classroom.google.com/c/ODY1MzU4MzYwMzcx',
  '1-3 HR':'https://classroom.google.com/c/ODY2NzQwMjIwMDQ3',
  'バスケ':'https://classroom.google.com/c/MzI3NTczNzQyMTQy',
};
// 日付なし項目の並び順（小さいほど先）
function undatedRank(it){ const m={'次回の授業':1,'当面の間':2,'夏休み':3,'常時':4}; return m[it.dateLabel]||9; }

let done={}; try{done=JSON.parse(localStorage.getItem('classroom_done_v1')||'{}');}catch(e){done={};}
function saveDone(){try{localStorage.setItem('classroom_done_v1',JSON.stringify(done));}catch(e){}}

const today=new Date(); today.setHours(0,0,0,0);
const WD=['日','月','火','水','木','金','土'];
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dleft(s){return Math.round((pd(s)-today)/86400000);}
document.getElementById('todayLabel').textContent=`今日 ${today.getMonth()+1}/${today.getDate()}（${WD[today.getDay()]}）`;
const _ud=pd(DATA.updateISO);
function relDay(dt){ const diff=Math.round((dt-today)/86400000);
  if(diff===0)return'本日'; if(diff===-1)return'昨日'; if(diff===1)return'明日';
  return `${dt.getMonth()+1}/${dt.getDate()}(${WD[dt.getDay()]})`; }
const UPDSTR=`${relDay(_ud)}${DATA.updateTime?' '+DATA.updateTime:''}`;
document.getElementById('updateLabel').textContent=`Update: ${UPDSTR}`;

// Update基準で「24時間以内（更新日当日〜前日）」の投稿をNew扱いにする
const UPDATE=pd(DATA.updateISO); UPDATE.setHours(0,0,0,0);
function parsePosted(s){ const p=s.split('/').map(Number);
  return p.length===3 ? new Date(p[0],p[1]-1,p[2]) : new Date(UPDATE.getFullYear(),p[0]-1,p[1]); }
function isNew(it){ if(!it.posted) return false; const d=Math.round((UPDATE-parsePosted(it.posted))/86400000); return d>=0 && d<=1; }

function urg(it){ if(!it.date)return'flat'; const d=dleft(it.date);
  if(d<0)return'past'; if(d<=1)return'now'; if(d<=4)return'soon'; if(d<=10)return'week'; return'flat'; }
function cd(it){ if(!it.date)return null; const d=dleft(it.date); const u=urg(it);
  let t = d<0?'過ぎた':d===0?'本日':d===1?'明日':`あと${d}日`;
  const cls = d<0?'cd-past':u==='now'?'cd-now':u==='soon'?'cd-soon':u==='week'?'cd-week':'cd-flat';
  return {cls,t}; }

function render(){
  const hD=hideDone.checked,hP=hidePast.checked,hO=hideOpt.checked,hC=hideClub.checked;
  ['hw','no'].forEach(cat=>{
    const tb=document.getElementById('list-'+cat); tb.innerHTML='';
    const postedTime=it=>it.posted?parsePosted(it.posted).getTime():-Infinity;
    const tie=(a,b)=>(postedTime(b.it)-postedTime(a.it))||(a.i-b.i);
    const list=ITEMS.map((it,i)=>({it,i})).filter(x=>x.it.cat===cat)
      .sort((a,b)=>{ const ad=a.it.date,bd=b.it.date;
        if(ad&&bd)return ad<bd?-1:ad>bd?1:tie(a,b);
        if(ad&&!bd)return -1; if(!ad&&bd)return 1;
        return (undatedRank(a.it)-undatedRank(b.it))||tie(a,b); });
    let shown=0;
    list.forEach(({it})=>{
      const u=urg(it),isDone=!!done[it.id],isPast=u==='past';
      if(hD&&isDone)return; if(hP&&isPast)return; if(hO&&it.optional)return; if(hC&&it.subject==='部活')return;
      shown++;
      const c=cd(it);
      const tr=document.createElement('tr');
      tr.id='row-'+it.id;
      tr.className=`${u}${isDone?' done':''}${isPast&&!isDone?' past':''}`;
      tr.innerHTML=`
        <td class="c-chk"><input type="checkbox" ${isDone?'checked':''} data-id="${it.id}"></td>
        <td class="c-date">${it.dateLabel}${c?`<br><span class="countdown ${c.cls}">${c.t}</span>`:''}<span class="c-subline"><span class="tag">${it.subject}</span></span></td>
        <td class="todo"><b>${it.title}</b>${it.optional?'<span class="opt">希望者</span>':''}${it.url&&(it.url.includes('/m/')||it.hasLink)?` <a class="dlink" href="${it.url}" target="_blank" rel="noopener">詳細 ↗</a>`:''}
          ${it.details&&it.details.length?`<ul>${it.details.map(d=>`<li>${d}</li>`).join('')}</ul>`:''}</td>
        <td class="c-thread">${(it.url||THREAD_LINKS[it.thread])?`<a href="${it.url||THREAD_LINKS[it.thread]}" target="_blank" rel="noopener">${it.thread}</a>`:it.thread}${(it.poster||it.posted)?`<span class="c-postline">${it.poster||''}${it.posted?`（${it.posted}）`:''}</span>`:''}${(isNew(it)&&!isPast)?`<span class="c-newline"><span class="newbadge">New</span></span>`:''}${it.note?`<span class="warn">⚠ ${it.note}</span>`:''}</td>`;
      tb.appendChild(tr);
    });
    if(!shown)tb.innerHTML='<tr><td colspan="4" style="color:var(--ink-soft);text-align:center;padding:18px">表示する項目はありません。</td></tr>';
    document.getElementById('cnt-'+cat).textContent=`${shown}件`;
  });
  document.querySelectorAll('.c-chk input').forEach(c=>{
    c.onchange=()=>{ if(c.checked)done[c.dataset.id]=1; else delete done[c.dataset.id]; saveDone(); render(); };
  });
}
['hideDone','hidePast','hideOpt','hideClub'].forEach(id=>{ const el=document.getElementById(id);
  el.onchange=()=>{ el.closest('.toggle').classList.toggle('on',el.checked); render(); }; });
document.querySelectorAll('.cbtn').forEach(b=>{
  b.onclick=()=>{ const t=document.getElementById(b.dataset.target); if(!t)return;
    const hidden=t.style.display==='none'; t.style.display=hidden?'':'none'; b.textContent=hidden?'−':'+'; }; });
function flashRow(id){ const r=document.getElementById('row-'+id); if(!r)return;
  const box=r.closest('.tbl-wrap');
  if(box&&box.style.display==='none'){ box.style.display=''; const b=document.querySelector('.cbtn[data-target="'+box.id+'"]'); if(b)b.textContent='−'; }
  r.scrollIntoView({behavior:'smooth',block:'center'});
  r.classList.add('flash'); setTimeout(()=>r.classList.remove('flash'),1700); }
document.getElementById('foot').innerHTML=
  '＊最新の投稿を反映できていないこと、ご了承下さい<br>'+
  '＊先生からの投稿をまとめただけなので、Classroomの投稿本文をご参照下さい';
(function renderTT(){
  const TT=DATA.timetable; if(!TT)return;
  const tISO=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('sec-tt').style.display='';
  document.getElementById('tt-week').textContent=TT.label;
  document.getElementById('tt-head').innerHTML='<tr><th>時限</th>'+
    TT.days.map(d=>`<th class="${d.iso===tISO?'tt-today':''}">${d.n}<br>${d.md}</th>`).join('')+'</tr>';
  const nDays=TT.days.length, span=new Array(nDays).fill(0);
  let body='';
  TT.rows.forEach((row,i)=>{
    let cells=`<td class="tt-p">${i+1}</td>`;
    for(let j=0;j<nDays;j++){
      if(span[j]>0){ span[j]--; continue; }
      const c=row[j];
      const hl=TT.days[j].iso===tISO?' tt-today':'';
      if(!c){ cells+=`<td class="${hl.trim()}"></td>`; continue; }
      const rs=(c.rs&&c.rs>1)?c.rs:1; if(rs>1) span[j]=rs-1;
      const meta=(c.r||c.t)?`<span class="tt-meta">${c.r||''}${c.t?' / '+c.t:''}</span>`:'';
      const mk=c.mk?`<span class="tt-mk">${c.mk}</span>`:'';
      let inner=`<b>${c.s}</b>${meta}${mk}`;
      if(c.ref) inner=`<a class="tt-link" href="#row-${c.ref}" onclick="flashRow('${c.ref}');return false;">${inner}</a>`;
      cells+=`<td class="tt-c${hl}${rs>1?' tt-span':''}"${rs>1?` rowspan="${rs}"`:''}>${inner}</td>`;
    }
    body+=`<tr>${cells}</tr>`;
  });
  document.getElementById('tt-body').innerHTML=body;
})();
render();
</script>
